# Configuration for Readme-Workflows/recent-activity
# Full option reference: https://github.com/Readme-Workflows/recent-activity/wiki/Configuration

max_lines: 5

# Only show commits (push events), since that's what we want on the profile.
whitelisted_events:
  - push

date:
  timezone: "America/Bogota"
  format: "yyyy-mm-dd HH:MM"
